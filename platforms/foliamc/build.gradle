repositories {
    maven {
        name = "papermc-repo"
        url = "https://repo.papermc.io/repository/maven-public/"
    }
}

dependencies {
    compileOnly project(':bukkit')

    // Folia API
    compileOnly 'dev.folia:folia-api:1.21.11-R0.1-SNAPSHOT'

    // MCBackpack FoliaMC host (shaded): provides the relocated MCExtension API
    // (io.github.mcvalac.mcextension.*) and the MCBackpack provider classes.
    compileOnly 'io.github.mcvalac:foliamc:2026.0.7-2'
}

base {
    archivesName = "${project.property('project-name')}FoliaMC"
}

publishing {
    publications {
        mavenJava(MavenPublication) {
            from components.java
            artifactId = 'foliamc'

            pom {
                name = project.name
                description = "MCValac Extension Default FoliaMC"
            }
        }
    }
}
