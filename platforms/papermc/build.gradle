repositories {
    maven {
        name = "papermc-repo"
        url = "https://repo.papermc.io/repository/maven-public/"
    }
}

dependencies {
    compileOnly project(':bukkit')

    // Paper API
    compileOnly 'io.papermc.paper:paper-api:1.21.11-R0.1-SNAPSHOT'

    // MCExtension PaperMC specific dependency
    compileOnly 'io.github.mcengine:papermc:2026.0.6-5'

    // MCBackpack provider
    compileOnly 'io.github.mcvalac:mcbackpack-common:2026.0.5-1'
    compileOnly 'io.github.mcvalac:mcbackpack-papermc:2026.0.5-2'
}

base {
    archivesName = "${project.property('project-name')}PaperMC"
}

publishing {
    publications {
        mavenJava(MavenPublication) {
            from components.java
            artifactId = 'papermc'

            pom {
                name = project.name
                description = "MCValac Extension Default PaperMC"
            }
        }
    }
}
