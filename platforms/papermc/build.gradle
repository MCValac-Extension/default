repositories {
    maven {
        name = "papermc-repo"
        url = "https://repo.papermc.io/repository/maven-public/"
    }
}

dependencies {
    compileOnly project(':bukkit')

    // Paper API
    compileOnly 'io.papermc.paper:paper-api:1.21.11-R0.1-SNAPSHOT'

    // MCBackpack PaperMC host (shaded): provides the relocated MCExtension API
    // (io.github.mcvalac.mcextension.*) and the MCBackpack provider classes.
    compileOnly 'io.github.mcvalac:papermc:2026.0.7-1'
}

base {
    archivesName = "${project.property('project-name')}PaperMC"
}

publishing {
    publications {
        mavenJava(MavenPublication) {
            from components.java
            artifactId = 'papermc'

            pom {
                name = project.name
                description = "MCValac Extension Default PaperMC"
            }
        }
    }
}
