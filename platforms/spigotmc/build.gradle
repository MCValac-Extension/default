repositories {
    maven {
        name = "papermc-repo"
        url = "https://repo.papermc.io/repository/maven-public/"
    }
    maven {
        url = 'https://hub.spigotmc.org/nexus/content/groups/public/'

        content {
            includeGroup 'org.bukkit'
            includeGroup 'org.spigotmc'
        }
    }
}

dependencies {
    compileOnly project(':bukkit')

    // Paper API provides the shared Bukkit surface plus Paper-specific domain APIs reused by the entry point
    compileOnly 'io.papermc.paper:paper-api:1.21.11-R0.1-SNAPSHOT'

    // MCBackpack SpigotMC host (shaded): provides the relocated MCExtension API
    // (io.github.mcvalac.mcextension.*) and the MCBackpack provider classes.
    compileOnly 'io.github.mcvalac:spigotmc:2026.0.7-1'
}

base {
    archivesName = "${project.property('project-name')}SpigotMC"
}

publishing {
    publications {
        mavenJava(MavenPublication) {
            from components.java
            artifactId = 'spigotmc'

            pom {
                name = project.name
                description = "MCValac Extension Default SpigotMC"
            }
        }
    }
}
